schema_version: "1.0"
backlog_id: "glyph-v1"
source_of_truth: true
owner_agent: "glyph-orchestrator"

status_values:
  - DRAFT
  - WAITING_INPUT
  - READY
  - IN_PROGRESS
  - BLOCKED
  - IN_REVIEW
  - DONE

gate_values:
  - ORCHESTRATOR
  - DPO
  - CISO
  - QA
  - RELEASE

human_input_status_values:
  - TODO
  - PROVIDED
  - NOT_NEEDED
  - DECISION_REQUIRED

default_policy:
  no_prod_apply_without_explicit_human_approval: true
  prod_apply_requires:
    - explicit_human_approval.approved_by
    - explicit_human_approval.approval_timestamp
    - explicit_human_approval.change_ticket
    - gates.DPO == PASS
    - gates.CISO == PASS
    - gates.QA == PASS
    - gates.RELEASE == PASS
  status_transition_rules:
    - from: DRAFT
      to: [WAITING_INPUT, READY]
    - from: WAITING_INPUT
      to: [READY, BLOCKED]
    - from: READY
      to: [IN_PROGRESS, BLOCKED]
    - from: IN_PROGRESS
      to: [IN_REVIEW, BLOCKED]
    - from: IN_REVIEW
      to: [READY, DONE, BLOCKED]
  blocked_statuses_for_start:
    - DRAFT
    - WAITING_INPUT
    - BLOCKED

gates_deterministic_rules:
  - rule_id: GATE-BASE-001
    when: "always"
    require_gates: [ORCHESTRATOR, QA]
  - rule_id: GATE-DPO-001
    when_any_domain:
      - privacy
      - identity
      - logs
      - ai_payload
      - parsing_import
    require_gates: [DPO]
  - rule_id: GATE-CISO-001
    when_any_domain:
      - auth_session
      - crypto
      - identity
      - security
      - memory
      - parsing_import
      - logs
      - network
      - ci_cd
      - dependencies
      - secrets
      - supply_chain
      - build_release
      - infrastructure
      - ai_payload
    require_gates: [CISO]
  - rule_id: GATE-RELEASE-001
    when_any_domain:
      - ci_cd
      - dependencies
      - supply_chain
      - build_release
      - infrastructure
    require_gates: [RELEASE]

adr_priority_coverage_required:
  - ADR-001
  - ADR-003
  - ADR-004
  - ADR-007
  - ADR-013
  - ADR-019
  - ADR-021
  - ADR-031
  - ADR-032

global_forbidden: &zero_data_forbidden
  - "No user accounts"
  - "No password or email recovery"
  - "No tracking"
  - "No analytics"
  - "No persistent user identifiers"
  - "No access logs tied to users/sessions"
  - "No bank aggregation tokens"
  - "No server-side persistence of user financial data"

ai_contract:
  allowed_payload_fields:
    - labels
    - version
  forbidden_payload_fields:
    - amount
    - date
    - balance
    - iban
    - account_number
    - account_holder
    - bank_name
    - session_id
  forbidden_label_patterns:
    - "\\b[A-Z]{2}[0-9]{2}[A-Z0-9]{11,30}\\b" # IBAN-like
    - "\\b[0-9]{8,}\\b" # account/session-like
    - "\\b\\d{1,3}(?:[ .,']\\d{3})*(?:[.,]\\d{2})?\\s?(?:EUR|€|USD|CHF|GBP)?\\b" # amounts
    - "\\b(?:19|20)\\d{2}[-/]\\d{2}[-/]\\d{2}\\b" # dates
  sanitization_required: true
  sanitization_notes:
    - "Mask sensitive numeric/date/account motifs before AI call"
    - "Reject payload if fields beyond labels+version are present"

human_input_registry:
  infra.target_topology_v1: PROVIDED
  infra.iac_toolchain_v1: PROVIDED
  infra.prod_apply_operator: DECISION_REQUIRED
  hardware.tee_scope_v1: DECISION_REQUIRED
  hardware.attestation_provider: PROVIDED
  network.public_exposure_model: PROVIDED
  network.failover_policy: PROVIDED
  grist.version_pin: TODO
  grist.plugin_policy: TODO
  backend.language_split: TODO
  backend.error_redaction_policy: PROVIDED
  ai.provider_region: PROVIDED
  ai.model_reference: TODO
  ai.payload_schema_version: PROVIDED
  ai.sanitization_regex_set: TODO
  ai.full_transaction_payload: NOT_NEEDED
  release.go_no_go_approver: DECISION_REQUIRED
  release.beta_window: DECISION_REQUIRED
  release.prod_apply_policy: PROVIDED

